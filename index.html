<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pastebin</title>
    <style>
        div { position: absolute; top: 15px; bottom: 15px; left: 15px; right: 15px; }
        textarea { width: 100%; height: 55%; padding: 10px; resize: none; margin-bottom: 20px; }
        footer { position: absolute; bottom: 0px; width: 100%; text-align: center; }
        article { margin-bottom: 40px; }
        .right30 { margin-right: 30px; }
        #sub { width: 90px; height: 30px; }
    </style>
</head>
<body>
    <div>
        <form onsubmit="put(event)">
            <article>
                <textarea></textarea>
                <span class="right30">or</span><input type="file" name="f">
            </article>
            <article>
                <input class="right30" id="sub" type="submit" value="upload"><code><span id="link"></span></code>
            </article>
        </form>
        <footer>
            <pre>allow text/image file < 5M, curl api: -X POST -F f=@file.txt</pre>
        </footer>
    </div>
</body>
<script>
    function put(event) {
        event.preventDefault();
        var t = document.querySelector('textarea').value;
        var f = document.querySelector('input[type=file]').files[0];
        var formData = new FormData();
        if (f === undefined) {
            if (t.trim() === '') {
                alert("NULL");
                return;
            }
            f = new File([t], "f", {
                type: "text/plain"
            });
        }
        document.getElementById('sub').disabled = true;
        document.getElementById('link').textContent = 'waiting...';
        formData.append('f', f);
        var requestOptions = {
            method: 'POST',
            body: formData
        };
        fetch('/', requestOptions)
            .then(response => response.text())
            .then(f => {
                document.getElementById('link').textContent = f;
            });
    }
</script>
</html>
