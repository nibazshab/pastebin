<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pastebin</title>
  <style>
    textarea {
      width: 100%;
      height: 150px;
      padding: 10px;
      resize: none;
    }
    pre {
      word-wrap: break-word;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <form onsubmit="addMessage(event)">
    <textarea></textarea><br>
    <input type="submit" value="粘贴">
  </form>
  <pre><p>链接：<span></span></p></pre><br><br>
  <pre><p>这是一个简单的 pastebin 工具，你可以将你的文本内容粘贴到这里，然后会生成一个包含所粘贴的文本内容的链接</p></pre>
  <pre><p>！！！请不要在这里存放任何重要数据，因为随时可能会被删除</p></pre>
  <script>
    function addMessage(event) {
      event.preventDefault();

      var t = document.querySelector('textarea').value;

      if (t.trim() === '') {
        alert("内容不能为空");
        return;
      }

      var requestOptions = {
        method: 'POST',
        body: new URLSearchParams({
          t: t
        })
      };

      fetch('/', requestOptions)
        .then(response => response.text())
        .then(f => {
          document.querySelector('span').textContent = f;
          document.querySelector('input').style.display = 'none';
        });
    }
  </script>
</body>
</html>
