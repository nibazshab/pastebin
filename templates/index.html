<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pastebin</title>
    <style>
        body {
            margin: 30px 15%;
            font-family: monospace;
        }

        textarea {
            width: 100%;
            height: 40%;
            padding: 10px;
            outline: none;
            resize: none;
            margin-bottom: 20px;
        }

        div {
            margin-bottom: 30px;
        }

        #sub {
            width: 80px;
            height: 30px;
            margin-right: 40px;
        }

        @media (max-width: 480px) {
            body {
                margin: 30px 20px;
            }
        }
    </style>
</head>

<body>
    <h1>PASTEBIN</h1>
    <form onsubmit="put(event)">
        <div>
            <textarea></textarea>
            <input type="file">
        </div>
        <div>
            <input id="sub" type="submit" value="Enter"><span id="link"></span>
        </div>
    </form>
</body>
<script>
    function put(event) {
        event.preventDefault();

        const data_file = document.querySelector('input[type=file]').files[0];
        const data_input = document.querySelector('textarea').value;

        const form_data = new FormData();

        if (data_file) {
            upload_file = data_file
        } else {
            if (data_input.trim() === '') {
                alert("NULL");
                return;
            }

            upload_file = new File([data_input], "f", {
                type: "text/plain"
            });
        } 

        document.getElementById('sub').disabled = true;
        document.getElementById('link').textContent = 'waiting...';

        form_data.append('f', upload_file);

        const request_options = {
            method: 'POST',
            body: form_data
        };

        fetch('/', request_options)
            .then(response => response.text())
            .then(back_value => {
                document.getElementById('link').textContent = back_value;
            });
    }
</script>

</html>
